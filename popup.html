<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h3>📂 TabKeeper Pro</h3>
      <div class="header-buttons">
        <button id="statsBtn" title="Statistics">📊</button>
        <button id="exportBtn" title="Export">📤</button>
        <button id="importBtn" title="Import">📥</button>
        <button id="clearAllBtn" title="Clear all">🗑️</button>
      </div>
    </div>
    
    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search by title or URL...">
    </div>
    
    <!-- Filter Bar -->
    <div class="filter-bar">
      <button id="pinFilterBtn" class="filter-btn">📌 Pinned Only</button>
      <button id="todayFilterBtn" class="filter-btn">📅 Today</button>
      <button id="weekFilterBtn" class="filter-btn">🗓️ This Week</button>
      <button id="clearFiltersBtn" class="filter-btn clear">✖️ Clear</button>
    </div>
    
    <!-- Tabs List -->
    <div id="tabsList" class="tabs-list">
      <div class="empty-state">✨ No closed tabs yet</div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <div class="footer-left">
        <span id="tabCount">0</span> tabs
        <span id="pinnedCount" class="pinned-badge">📌 0</span>
      </div>
      <div class="footer-buttons">
        <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
        <button id="refreshBtn" class="icon-btn" title="Refresh">🔄</button>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
